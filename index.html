<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asha ♡ Saurabh — Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=Cinzel&family=Lato&family=Josefin+Sans&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0118;font-family:'Lato',sans-serif;overflow-x:hidden;}

.rings-splash{
position:fixed;width:100%;height:100%;z-index:10000;
display:flex;flex-direction:column;align-items:center;justify-content:center;
background:#000;transition:opacity 1s;
}

.ring{width:150px;height:150px;border-radius:50%;position:absolute;
border:4px solid gold;}

.invite-btn{
margin-top:30px;padding:12px 40px;border:none;
background:gold;border-radius:40px;cursor:pointer;
opacity:0;pointer-events:none;
}
.invite-btn.reveal-invite{opacity:1;pointer-events:auto;}

.main-wedding-content{opacity:0;visibility:hidden;}
.visible-main{opacity:1;visibility:visible;}

.hero{height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="ringsSplash" class="rings-splash">
<div class="ring"></div>
<button id="inviteButton" class="invite-btn">OPEN INVITE</button>
</div>

<!-- MAIN -->
<div id="mainContent" class="main-wedding-content">

<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/shaikmustafa77/musta-salma-wedding/main/Wedding%20card%20video%20-%20invitation%20card%20video%20-%20pelli%20subhalekha%20video%20invitation%20%23weddinginvites.mp3">
</audio>

<section class="hero">
<div>
<h1>Asha ❤️ Saurabh</h1>
<p id="heroDate"></p>
<button id="musicControlBtn">Pause Music</button>
</div>
</section>

<div class="section">
<img src="./1.jpg" width="100%">
<img src="./2.jpg" width="100%">
<img src="./3.jpg" width="100%">
</div>

<!-- FIXED VIDEO -->
<div class="video-wrap">
<video controls muted loop playsinline>
<source src="./Trail-video.mp4" type="video/mp4">
</video>
</div>

<div class="section">
<div id="eventsContainer"></div>
</div>

<div class="section">
<div id="venuesContainer"></div>
</div>

<button id="whatsappShareBtn">Share</button>

</div>

<script>

/* DATA */
const weddingData={
events:[
{name:"Haldi",dateTime:"8 May"},
{name:"Wedding",dateTime:"10 May"},
{name:"Reception",dateTime:"10 May"}
],
venues:[
{name:"Mahajan Grand",lat:19.21,lng:72.98}
]
};

/* DATE */
const d=new Date(2026,4,10);
document.getElementById("heroDate").innerHTML=d.toDateString();

/* EVENTS */
weddingData.events.forEach(ev=>{
let div=document.createElement("div");
div.innerHTML=`${ev.name} - ${ev.dateTime}`;
eventsContainer.appendChild(div);
});

/* VENUES */
weddingData.venues.forEach(v=>{
let div=document.createElement("div");
div.innerHTML=v.name;
venuesContainer.appendChild(div);
});

/* RINGS + BUTTON */
const inviteBtn=document.getElementById("inviteButton");
const splash=document.getElementById("ringsSplash");
const main=document.getElementById("mainContent");

setTimeout(()=>inviteBtn.classList.add("reveal-invite"),1500);

function revealWebsite(){
main.classList.add("visible-main");
splash.style.opacity="0";
setTimeout(()=>splash.style.display="none",800);
bgMusic.play().catch(()=>{});
}

inviteBtn.onclick=revealWebsite;

/* MUSIC */
let musicPlaying=true;
const bgMusic=document.getElementById("bgMusic");
document.getElementById("musicControlBtn").onclick=()=>{
if(musicPlaying){bgMusic.pause();}
else{bgMusic.play().catch(()=>{});}
musicPlaying=!musicPlaying;
};

/* WHATSAPP FIXED */
const shareMessage=`Wedding Invitation 💍
Asha & Saurabh
10 May 2026`;

document.getElementById("whatsappShareBtn").onclick=()=>{
window.open(`https://wa.me/?text=${encodeURIComponent(shareMessage)}`);
};

/* FAILSAFE */
setTimeout(()=>{
if(!main.classList.contains("visible-main")){
revealWebsite();
}
},4000);

</script>

</body>
</html>
