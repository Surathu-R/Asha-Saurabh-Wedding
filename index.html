<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asha ♡ Saurabh — Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel&family=Cormorant+Garamond&family=Lato&family=Josefin+Sans&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:#0a0118;
  font-family:'Lato',sans-serif;
  overflow-x:hidden;
  -webkit-text-size-adjust:100%;
}

/* SPLASH */
.rings-splash{
  position:fixed;width:100%;height:100%;
  display:flex;justify-content:center;align-items:center;
  background:#000;z-index:10000;
  animation:cinematicZoom 2.5s ease forwards;
}

@keyframes cinematicZoom{
  0%{transform:scale(1);opacity:1;}
  80%{transform:scale(1.08);opacity:1;}
  100%{transform:scale(1.15);opacity:0;}
}

/* MAIN */
.main-wedding-content{
  opacity:0;visibility:hidden;
  transition:opacity 0.8s ease;
}
.visible-main{
  opacity:1;visibility:visible;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;justify-content:center;align-items:center;
  text-align:center;padding:60px 16px;
}
.hero h1{
  font-family:'Cinzel';
  color:#f5c842;
  font-size:32px;
}

/* GALLERY */
.gallery{
  display:grid;
  grid-template-columns:1fr;
  gap:20px;
  padding:20px;
}
.gallery img{
  width:100%;
  border-radius:12px;
  filter:blur(8px);
  transition:0.6s;
}
.gallery img.loaded{filter:blur(0);}

/* VIDEO */
video{
  width:100%;
  border-radius:12px;
}

/* BUTTON */
button{
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#f5c842;
  cursor:pointer;
  touch-action:manipulation;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="ringsSplash" class="rings-splash"></div>

<!-- MAIN -->
<div id="mainContent" class="main-wedding-content">

<audio id="bgMusic" loop>
<source src="https://raw.githubusercontent.com/shaikmustafa77/musta-salma-wedding/main/Wedding%20card%20video%20-%20invitation%20card%20video%20-%20pelli%20subhalekha%20video%20invitation%20%23weddinginvites.mp3">
</audio>

<section class="hero">
<div>
<h1>Asha ❤️ Saurabh</h1>
<p id="date"></p>
<button id="musicBtn">Pause Music</button>
</div>
</section>

<!-- IMAGES -->
<div class="gallery">
<img src="./images/1.jpg" loading="lazy">
<img src="./images/2.jpg" loading="lazy">
<img src="./images/3.jpg" loading="lazy">
</div>

<!-- VIDEO -->
<div style="padding:20px">
<video controls muted loop playsinline preload="metadata">
<source src="./video/Trail-video.mp4" type="video/mp4">
</video>
</div>

<!-- EVENTS -->
<div id="events"></div>

<!-- VENUES -->
<div id="venues"></div>

<button id="shareBtn">Share on WhatsApp</button>

</div>

<script>

/* DATE */
const d=new Date(2026,4,10);
document.getElementById("date").innerHTML=d.toDateString();

/* AUTO ENTER */
setTimeout(()=>reveal(),2600);

/* REVEAL */
const splash=document.getElementById("ringsSplash");
const main=document.getElementById("mainContent");
const music=document.getElementById("bgMusic");

function reveal(){
  main.classList.add("visible-main");
  splash.style.display="none";
  music.play().catch(()=>{});
}

/* FAILSAFE */
setTimeout(()=>{
 if(!main.classList.contains("visible-main")) reveal();
},4000);

/* MUSIC */
let playing=true;
document.getElementById("musicBtn").onclick=()=>{
 if(playing){music.pause();}
 else{music.play().catch(()=>{});}
 playing=!playing;
};

/* IMAGE LOAD EFFECT */
document.querySelectorAll("img").forEach(img=>{
 img.onload=()=>img.classList.add("loaded");
});

/* DATA */
const events=[
"Haldi - 8 May",
"Wedding - 10 May",
"Reception - 10 May"
];
const venues=[
"Mahajan Grand, Thane"
];

events.forEach(e=>{
 let div=document.createElement("div");
 div.innerHTML=e;
 document.getElementById("events").appendChild(div);
});

venues.forEach(v=>{
 let div=document.createElement("div");
 div.innerHTML=v;
 document.getElementById("venues").appendChild(div);
});

/* WHATSAPP */
const msg=`Wedding Invitation 💍
Asha & Saurabh
10 May 2026`;

document.getElementById("shareBtn").onclick=()=>{
 window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
};

</script>

</body>
</html>
