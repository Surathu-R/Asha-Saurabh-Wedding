/* ✅ FIXED revealWebsite (MAIN FIX) */
function revealWebsite() {

  // SHOW CONTENT FIRST (critical fix)
  mainContent.classList.add("visible-main");

  splashDiv.style.opacity = "0";

  setTimeout(() => {
    splashDiv.style.display = "none";
  }, 800);

  // SAFE MUSIC (never blocks)
  bgMusic.play().catch(() => {});

  setTimeout(() => {
    document.querySelectorAll(".main-wedding-content .reveal").forEach(el => {
      if (el.getBoundingClientRect().top < window.innerHeight - 80) {
        el.classList.add("visible");
      }
    });
    addPetals();
  }, 200);
}

/* KEEP YOUR BUTTON */

  revealWebsite();
});
